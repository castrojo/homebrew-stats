name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: stats-go/go.mod
          cache-dependency-path: stats-go/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Restore traffic history cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: tap-history-v1-${{ github.run_id }}
          restore-keys: tap-history-v1-

      - name: Build stats binary
        run: cd stats-go && go build -o stats ./cmd/stats/

      - name: Fetch Homebrew tap data
        id: sync-homebrew
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-homebrew

      - name: Restore stats fallback if homebrew sync failed
        if: steps.sync-homebrew.outcome == 'failure'
        run: |
          if [ -f ".sync-cache/stats-latest.json" ]; then
            echo "⚠️ Homebrew sync failed — using cached stats-latest.json"
            mkdir -p src/data
            cp .sync-cache/stats-latest.json src/data/stats.json
          else
            echo "❌ Sync failed and no cached stats available"
            exit 1
          fi

      - name: Fetch Testhub package stats
        id: sync-testhub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-testhub

      - name: Fetch countme active-user stats
        id: sync-countme
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-countme

      - name: Save traffic history cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: tap-history-v1-${{ github.run_id }}
          retention-days: 90

      - name: Install npm dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify charts have data
        run: |
          count=$(grep -c 'chart-empty' dist/index.html || true)
          if [ "$count" -gt 0 ]; then
            echo "❌ $count chart(s) show 'Not enough history' — history bootstrap failed"
            echo "   This means stats.json history did not reach the build."
            echo "   Check that the history cache was restored and bootstrapped correctly."
            exit 1
          fi
          echo "✅ All charts have data (no chart-empty found)"

      - name: Verify summary KPIs are populated
        run: |
          total=$(jq '.summary.total_packages // 0' src/data/stats.json)
          if [ "$total" -eq 0 ]; then
            echo "❌ summary.total_packages is 0 — Go binary may not have run correctly"
            exit 1
          fi
          echo "✅ summary.total_packages = $total"

      - name: Verify testhub data (warn-only)
        if: steps.sync-testhub.outcome == 'success'
        run: |
          count=$(jq '.packages | length' src/data/testhub.json 2>/dev/null || echo 0)
          if [ "$count" -gt 0 ]; then
            echo "✅ testhub.packages = $count"
          else
            echo "⚠️ testhub.packages is empty — data collection may still be bootstrapping"
          fi

      - name: Verify countme data (warn-only)
        if: steps.sync-countme.outcome == 'success'
        run: |
          total=$(jq '.current_week.total // 0' src/data/countme.json 2>/dev/null || echo 0)
          if [ "$total" -gt 0 ]; then
            echo "✅ countme current_week.total = $total"
          else
            echo "⚠️ countme current_week is empty — data collection may still be bootstrapping"
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E chart tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
