name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: stats-go/go.mod
          cache-dependency-path: stats-go/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Restore traffic history cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: tap-history-v4-${{ github.run_id }}
          restore-keys: tap-history-v4-

      - name: Restore contributor history cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: contributor-history-v1-${{ github.run_id }}
          restore-keys: contributor-history-v1-

      - name: Restore build history cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: builds-history-v2-${{ github.run_id }}
          restore-keys: builds-history-v2-

      - name: Ensure contributors.json exists
        run: |
          if [ ! -f "src/data/contributors.json" ]; then
            echo "⚠️  contributors.json not found in cache or repo — using empty seed"
            mkdir -p src/data
            # This should not happen if seed file is committed, but guard against it
            echo '{"generated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","period":{"start":"","end":""},"summary":{"active_contributors":0,"active_contributors_60d":0,"active_contributors_365d":0,"new_contributors":0,"total_commits":0,"total_commits_60d":0,"total_commits_365d":0,"total_prs_merged":0,"total_prs_merged_60d":0,"total_prs_merged_365d":0,"total_issues_opened":0,"total_issues_closed":0,"bus_factor":0,"bus_factor_60d":0,"bus_factor_365d":0,"review_participation_rate":0,"active_repos":0,"total_discussions":0,"discussion_answer_rate":0},"top_contributors":[],"repos":[],"discussions_summary":{"total_discussions_30d":0,"total_discussions_60d":0,"total_discussions_365d":0,"total_discussion_comments_30d":0,"total_discussion_comments_60d":0,"total_discussion_comments_365d":0,"unique_discussion_authors_30d":0,"unique_discussion_authors_60d":0,"unique_discussion_authors_365d":0,"answered_rate":0,"weekly_trend":[]}}' \
              > src/data/contributors.json
            echo "✅ wrote empty contributors.json sentinel"
          else
            contrib_count=$(jq '.top_contributors | length' src/data/contributors.json 2>/dev/null || echo 0)
            echo "✅ contributors.json found: $contrib_count top contributors"
          fi

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2

      - name: Build stats binary
        run: cd stats-go && go build -o stats ./cmd/stats/

      - name: Fetch Homebrew tap data
        id: sync-homebrew
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-homebrew

      - name: Restore stats fallback if homebrew sync failed
        if: steps.sync-homebrew.outcome == 'failure'
        run: |
          if [ -f ".sync-cache/stats-latest.json" ]; then
            echo "⚠️ Homebrew sync failed — using cached stats-latest.json"
            mkdir -p src/data
            cp .sync-cache/stats-latest.json src/data/stats.json
          else
            echo "❌ Sync failed and no cached stats available"
            exit 1
          fi

      - name: Fetch Testhub package stats
        id: sync-testhub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-testhub

      - name: Fetch countme active-user stats
        id: sync-countme
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-countme

      - name: Fetch build pipeline metrics (Bluefin)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-bluefin
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (Aurora)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-aurora
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (Bazzite)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-bazzite
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (Universal Blue)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-universal-blue
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (uCore)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-ucore
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (Zirconium)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-zirconium
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (bootcrew)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-bootcrew
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch build pipeline metrics (BlueBuild)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-builds-blue-build
        continue-on-error: true
        timeout-minutes: 8

      - name: Fetch Quay.io pull stats (Fedora)
        run: ./stats-go/stats fetch-quay-fedora
        continue-on-error: true
        timeout-minutes: 5

      - name: Fetch Quay.io pull stats (CentOS)
        run: ./stats-go/stats fetch-quay-centos
        continue-on-error: true
        timeout-minutes: 5

      - name: Fetch Quay.io pull stats (AlmaLinux)
        run: ./stats-go/stats fetch-quay-almalinux
        continue-on-error: true
        timeout-minutes: 5

      - name: Fetch Scorecard data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-scorecard
        continue-on-error: true

      - name: Fetch supply chain data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-supply-chain
        continue-on-error: true

      - name: Fetch release frequency data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stats-go/stats fetch-releases
        continue-on-error: true
        timeout-minutes: 5

      - name: Save traffic history cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: tap-history-v4-${{ github.run_id }}

      - name: Save build history cache
        if: always()
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: builds-history-v2-${{ github.run_id }}

      - name: Install npm dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Write build metadata sentinel
        run: |
          mkdir -p public
          echo "{\"generated_at\": \"$(date -u +%Y-%m-%d)\"}" > public/meta.json
          echo "✅ wrote public/meta.json: $(cat public/meta.json)"

      - name: Build Astro site
        run: npm run build

      - name: Verify charts have data
        run: |
          # Match the HTML element class attribute — NOT the CSS class definition.
          # Astro inlines .chart-empty{} CSS rules into the HTML <style> tag, so a
          # bare grep for 'chart-empty' produces false positives even when all charts
          # are healthy. We need to match the rendered element: class="chart-empty".
          for page in dist/index.html dist/testhub/index.html dist/overall/index.html; do
            count=$(grep -c 'class="chart-empty"' "$page" || true)
            if [ "$count" -gt 0 ]; then
              echo "❌ $page: $count chart(s) rendered in empty state"
              echo "   Run: grep -n 'class=\"chart-empty\"' $page"
              exit 1
            fi
            echo "✅ $page: no empty charts"
          done
          # Aurora/Bazzite/Bluefin builds pages start in bootstrap state — show "Collecting
          # build data" text instead of charts. Skip chart-empty check for these pages.
          for page in dist/builds/index.html dist/aurora-builds/index.html dist/bazzite-builds/index.html; do
            if [ -f "$page" ]; then
              echo "✅ $page: exists (bootstrap state is expected on first run)"
            else
              echo "❌ $page: page was not built"
              exit 1
            fi
          done
          # Contributors page has 3 LFX-gated charts (org breakdown, PR health, new vs returning)
          # that are intentionally empty until LFX Insights sync runs. Allow up to 4 empty;
          # fail only if MORE than 4 are empty (which would indicate structural breakage).
          contrib_count=$(grep -o 'class="chart-empty"' dist/contributors/index.html | wc -l || echo 0)
          if [ "$contrib_count" -gt 4 ]; then
            echo "❌ dist/contributors/index.html: $contrib_count empty charts (expected ≤4 LFX-gated)"
            exit 1
          fi
          echo "✅ dist/contributors/index.html: $contrib_count/4 LFX-gated charts in empty state (expected)"

      - name: Verify summary KPIs are populated
        run: |
          total=$(jq '.summary.total_packages // 0' src/data/stats.json)
          if [ "$total" -eq 0 ]; then
            echo "❌ summary.total_packages is 0 — Go binary may not have run correctly"
            exit 1
          fi
          echo "✅ summary.total_packages = $total"

      - name: Verify testhub data (warn-only)
        if: steps.sync-testhub.outcome == 'success'
        run: |
          pkg_count=$(jq '.packages | length' src/data/testhub.json 2>/dev/null || echo 0)
          metric_count=$(jq '.build_metrics | length' src/data/testhub.json 2>/dev/null || echo 0)
          known=$(jq '[.build_metrics[] | select(.last_status != "unknown" and .last_status != "")] | length' src/data/testhub.json 2>/dev/null || echo 0)
          last_hist_date=$(jq -r '[.history[].date] | max // ""' src/data/testhub.json 2>/dev/null || echo "")
          stale_days=""
          if [ -n "$last_hist_date" ]; then
            now_ts=$(date -u +%s)
            hist_ts=$(date -u -d "$last_hist_date" +%s 2>/dev/null || echo "")
            if [ -n "$hist_ts" ]; then
              stale_days=$(( (now_ts - hist_ts) / 86400 ))
            fi
          fi
          echo "  packages: $pkg_count"
          echo "  build_metrics: $metric_count"
          if [ "$pkg_count" -gt 0 ]; then
            echo "✅ testhub.packages = $pkg_count"
          else
            echo "⚠️  testhub.packages is empty — data collection may still be bootstrapping"
          fi
          if [ "$metric_count" -gt 0 ]; then
            echo "✅ $known/$metric_count packages have known build status"
            if [ "$known" -eq 0 ]; then
              echo "⚠️  All packages show unknown build status — cache may be stale or lastRunID may be stuck"
              echo "     Tip: check 'build counts: 0 apps' in logs above; if lastRunID isn't advancing, bump cache version"
            fi
          else
            echo "⚠️  build_metrics is empty — testhub build status will show ⚪ — for all packages"
          fi
          if [ -n "$stale_days" ] && [ "$stale_days" -gt 7 ]; then
            echo "⚠️  testhub history last date is $last_hist_date ($stale_days days old)"
            echo "     This can mean upstream testhub build.yml has not produced new runs recently."
          fi

      - name: Verify countme data (warn-only)
        if: steps.sync-countme.outcome == 'success'
        run: |
          total=$(jq '.current_week.total // 0' src/data/countme.json 2>/dev/null || echo 0)
          if [ "$total" -gt 0 ]; then
            echo "✅ countme current_week.total = $total"
          else
            echo "⚠️ countme current_week is empty — data collection may still be bootstrapping"
          fi

      - name: Verify builds pages have data
        run: |
          for image in bluefin aurora bazzite universal-blue ucore zirconium bootcrew; do
            f="src/data/builds-${image}.json"
            if [ ! -f "$f" ]; then
              echo "❌ ${f} is missing"
              exit 1
            fi
            health_status=$(jq -r '.summary.health_status // "__missing__"' "$f" 2>/dev/null || echo "__invalid__")
            if [ "$health_status" = "__invalid__" ] || [ "$health_status" = "__missing__" ]; then
              echo "❌ ${f} is invalid JSON or missing summary.health_status"
              exit 1
            fi
            if [ "$health_status" = "unknown" ]; then
              echo "⚠️ ${f} is in bootstrap state (cold cache) — skipping strict check"
            else
              echo "✅ ${f} has real data"
            fi
          done

      - name: Verify contributors data (warn-only)
        run: |
          if [ -f "src/data/contributors.json" ]; then
            contrib_count=$(jq '.top_contributors | length' src/data/contributors.json 2>/dev/null || echo 0)
            active=$(jq '.summary.active_contributors // 0' src/data/contributors.json 2>/dev/null || echo 0)
            if [ "$contrib_count" -gt 0 ]; then
              echo "✅ contributors: $contrib_count contributors, $active active"
            else
              echo "⚠️  contributors.json has no top_contributors — run contributor-sync.yml to populate"
            fi
          else
            echo "⚠️  contributors.json missing — contributor-sync.yml has not run yet"
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E chart tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
