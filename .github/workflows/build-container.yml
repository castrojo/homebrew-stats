name: Build and Push Container

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"   # daily at 8 AM UTC (after Pages build)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: stats-go/go.mod
          cache-dependency-path: stats-go/go.sum

      - name: Restore traffic history cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .sync-cache
          key: tap-history-v1-${{ github.run_id }}
          restore-keys: tap-history-v1-

      - name: Sync tap data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (cd stats-go && go build -o stats ./cmd/stats/)
          ./stats-go/stats

      - name: Log in to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Containerfile
          push: true
          build-args: SKIP_GO_SYNC=true
          tags: |
            ghcr.io/castrojo/bootc-ecosystem:latest
            ghcr.io/castrojo/bootc-ecosystem:${{ github.sha }}
